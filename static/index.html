<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki RAG</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        </svg>
        <h1>Wiki RAG</h1>
      </div>
      <p class="subtitle">Ask anything — answers grounded in Wikipedia</p>
    </header>

    <main id="chat">
      <div class="welcome">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4"/>
            <path d="M12 8h.01"/>
          </svg>
        </div>
        <h2>What would you like to know?</h2>
        <p>I fetch Wikipedia articles in real-time and use RAG to answer your questions with cited sources.</p>
        <div class="suggestions">
          <button class="suggestion" data-q="What is the International Space Station?">What is the ISS?</button>
          <button class="suggestion" data-q="How do neural networks work?">How do neural networks work?</button>
          <button class="suggestion" data-q="What causes climate change?">What causes climate change?</button>
        </div>
      </div>
    </main>

    <form id="input-form">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Ask a question..." autocomplete="off"></textarea>
        <button type="submit" id="send-btn" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">Powered by ARF &amp; Wikipedia. Answers may contain inaccuracies.</p>
    </form>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
